name: CA Tracker

on:
  schedule:
    - cron: "*/15 * * * *"   # runs every 15 minutes
  workflow_dispatch:          # lets you manually trigger a run from the Actions tab

jobs:
  check-tweets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python ca_tracker.py

      - name: Save seen tweets (persist state)
        run: |
          touch seen_tweets.txt
          git config user.name "ca-tracker-bot"
          git config user.email "actions@github.com"
          git add seen_tweets.txt
          git diff --quiet --cached || git commit -m "Update seen tweets"
          git push
